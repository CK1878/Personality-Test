<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #1a1a1a;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }
        #status {
            font-size: 0.7rem;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="status">TAP ONCE TO ENGAGE MONITOR</div>

    <script>
        let systemArmed = false;
        const statusDiv = document.getElementById('status');

        // Required explicitly by mobile browsers to unlock physical vibration api
        document.body.onclick = () => {
            systemArmed = true;
            statusDiv.innerHTML = "MONITOR ARMED // RUNNING IN BACK DROP";
            if (navigator.vibrate) navigator.vibrate(80);
        };

        // Connect to your specific Pusher application instance
        const pusher = new Pusher('503b42e786c59abc6913', {
            cluster: 'eu',
            forceTLS: true
        });

        const channel = pusher.subscribe('pulse-channel');
        
        // Listen directly for the spectator event
        channel.bind('client-pulse-event', function(data) {
            const choice = parseInt(data.choice);
            if (systemArmed && choice >= 1 && choice <= 20) {
                // Silently write value to screen (useful for debugging, invisible in pocket)
                statusDiv.innerHTML = "VECTOR ACQUIRED: " + choice;
                triggerHapticCode(choice);
            }
        });

        function triggerHapticCode(num) {
            if (!navigator.vibrate) return;

            const LONG = 450;      // 10s place pulse length
            const SHORT = 150;     // 1s place pulse length
            const GAP = 150;       // Gap between adjacent pulses
            const CHUNK_GAP = 600;  // Gap separating Tens from Ones array

            let sequence = [];

            // Compile tens chunk structure
            const tens = Math.floor(num / 10);
            for (let i = 0; i < tens; i++) {
                sequence.push(LONG);
                sequence.push(GAP);
            }

            // Calculate separating break if both places exist
            const ones = num % 10;
            if (tens > 0 && ones > 0) {
                sequence.pop(); 
                sequence.push(CHUNK_GAP);
            }

            // Compile ones chunk structure
            for (let i = 0; i < ones; i++) {
                sequence.push(SHORT);
                sequence.push(GAP);
            }

            // Clean trailing spaces and execute physical hardware pulse array
            if (sequence.length > 0) {
                if (sequence[sequence.length - 1] === GAP) sequence.pop();
                navigator.vibrate(sequence);
            }
        }
    </script>
</body>
</html>
